<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff2020"/>
      <stop offset="100%" stop-color="#bb0000"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" fill="#111"/>

  <!-- Circle ring open at bottom: endpoints at ~155° and ~205° clockwise from top -->
  <path d="M 70 87 A 42 42 0 1 0 30 87"
        fill="none" stroke="url(#r)" stroke-width="6" stroke-linecap="round"/>

  <!-- Left prong -->
  <rect x="43" y="21" width="6" height="16" rx="3" fill="url(#r)"/>

  <!-- Right prong -->
  <rect x="51" y="21" width="6" height="16" rx="3" fill="url(#r)"/>

  <!-- Shoulder bar (wider than U body) -->
  <rect x="22" y="37" width="56" height="8" rx="4" fill="url(#r)"/>

  <!-- U body: outer shape with inner hollow (evenodd) -->
  <!-- Outer legs x=32-68, inner hollow x=40-60, arcs from y=45 down to y=63/y=66 -->
  <path fill-rule="evenodd" fill="url(#r)" d="
    M 32 45 L 32 64 A 18 18 0 0 1 68 64 L 68 45 Z
    M 40 45 L 40 64 A 10 10 0 0 1 60 64 L 60 45 Z
  "/>

  <!-- Stem: thin, goes through circle gap -->
  <rect x="47" y="64" width="6" height="24" fill="url(#r)"/>
</svg>
