<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background fills entire square -->
  <rect width="100" height="100" fill="#111111"/>
  <!-- Red glowing circle border -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#ff3333" stroke-width="5" filter="url(#glow)"/>
  <!-- Left prong -->
  <rect x="32" y="17" width="10" height="23" rx="4" fill="#ff3333" filter="url(#glow)"/>
  <!-- Right prong -->
  <rect x="58" y="17" width="10" height="23" rx="4" fill="#ff3333" filter="url(#glow)"/>
  <!-- Plug body -->
  <rect x="21" y="38" width="58" height="28" rx="9" fill="#ff3333" filter="url(#glow)"/>
  <!-- Ground pin -->
  <rect x="45" y="64" width="10" height="19" rx="5" fill="#ff3333" filter="url(#glow)"/>
</svg>
